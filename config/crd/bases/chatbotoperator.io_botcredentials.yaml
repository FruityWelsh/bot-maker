---
# BotCredential Custom Resource Definition
# =========================================
# Defines the BotCredential resource for managing bot credentials
# References: docs/omen/strategy.json (Application Goal AG001, Security Goal AG004)
# References: docs/adr/architecture-decisions.md (ADR-001, ADR-004)
# References: features/chatbot.feature (BDD scenarios)

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: botcredentials.chatbotoperator.io
  labels:
    app: chatbot-operator
    version: v1alpha1
    group: chatbotoperator.io
    kind: BotCredential
  annotations:
    description: "BotCredential resource defines credentials for chat bot authentication"
    author: "Strategy Coder"
    version: "2026-05-25"
    references: "docs/omen/strategy.json, docs/adr/architecture-decisions.md, features/chatbot.feature"

spec:
  group: chatbotoperator.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - chatBotRef
                - credentialType
              properties:
                chatBotRef:
                  type: object
                  description: "Reference to the ChatBot this credential belongs to"
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: "Name of the ChatBot resource"
                      examples: ["customer-support-bot"]
                    
                    namespace:
                      type: string
                      description: "Namespace of the ChatBot resource"
                      default: ""
                
                credentialType:
                  type: string
                  description: "Type of credential"
                  enum: [apiToken, oauthToken, webhookSecret, apiKey, bearerToken, basicAuth, certificate]
                  examples: ["apiToken"]
                
                name:
                  type: string
                  description: "Name of this credential"
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
                  examples: ["slack-api-token"]
                
                description:
                  type: string
                  description: "Description of this credential"
                  maxLength: 500
                
                value:
                  type: string
                  description: "The credential value (will be stored in a Secret)"
                  format: password
                  examples: ["mock-credential-value"]
                
                valueFrom:
                  type: object
                  description: "Reference to existing Secret for the value"
                  properties:
                    secretKeyRef:
                      type: object
                      required:
                        - name
                        - key
                      properties:
                        name:
                          type: string
                          description: "Name of the Secret"
                          examples: ["slack-credentials"]
                        
                        key:
                          type: string
                          description: "Key in the Secret"
                          examples: ["token"]
                        
                        namespace:
                          type: string
                          description: "Namespace of the Secret"
                          default: ""
                
                platform:
                  type: string
                  description: "Platform this credential is for"
                  enum: [slack, matrix, discord, twilio, generic]
                  examples: ["slack"]
                
                scope:
                  type: string
                  description: "Scope of this credential"
                  enum: [bot, user, workspace, organization, global]
                  default: "bot"
                  examples: ["bot"]
                
                permissions:
                  type: array
                  description: "List of permissions granted by this credential"
                  items:
                    type: string
                  examples: [["chat:write", "users:read", "files:write"]]
                
                expiresAt:
                  type: string
                  format: date-time
                  description: "Expiration time for this credential"
                
                rotation:
                  type: object
                  description: "Credential rotation configuration"
                  properties:
                    enabled:
                      type: boolean
                      description: "Whether automatic rotation is enabled"
                      default: false
                    
                    schedule:
                      type: string
                      description: "Rotation schedule in cron format"
                      examples: ["0 0 * * *", "@daily"]
                    
                    rotationStrategy:
                      type: string
                      description: "Strategy for credential rotation"
                      enum: [immediate, graceful, rolling]
                      default: "graceful"
                    
                    gracePeriodHours:
                      type: integer
                      description: "Grace period in hours for old credentials"
                      default: 24
                      minimum: 1
                      maximum: 720
                    
                    maxRetries:
                      type: integer
                      description: "Maximum number of rotation retries"
                      default: 3
                      minimum: 0
                      maximum: 10
                
                encryption:
                  type: object
                  description: "Encryption configuration for the credential"
                  properties:
                    enabled:
                      type: boolean
                      description: "Whether the credential is encrypted at rest"
                      default: true
                    
                    algorithm:
                      type: string
                      description: "Encryption algorithm"
                      enum: [AES-256-GCM, AES-256-CBC, RSA-2048, RSA-4096]
                      default: "AES-256-GCM"
                    
                    keyReference:
                      type: object
                      description: "Reference to the encryption key"
                      properties:
                        name:
                          type: string
                          description: "Name of the Secret containing the encryption key"
                        
                        key:
                          type: string
                          description: "Key in the Secret"
                          default: "key"
                
                audit:
                  type: object
                  description: "Audit configuration for this credential"
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    
                    logAccess:
                      type: boolean
                      description: "Whether to log credential access"
                      default: true
                    
                    logChanges:
                      type: boolean
                      description: "Whether to log credential changes"
                      default: true
                
                labels:
                  type: object
                  additionalProperties:
                    type: string
                
                annotations:
                  type: object
                  additionalProperties:
                    type: string
            
            status:
              type: object
              description: "Status of the BotCredential resource"
              properties:
                phase:
                  type: string
                  description: "Current phase"
                  enum: [Pending, Creating, Ready, Rotating, Expired, Revoked, Failed, Deleted]
                
                message:
                  type: string
                  description: "Human-readable message"
                
                reason:
                  type: string
                  description: "Machine-readable reason"
                
                lastTransitionTime:
                  type: string
                  format: date-time
                
                secretName:
                  type: string
                  description: "Name of the Kubernetes Secret storing this credential"
                  examples: ["botcredential-slack-api-token-abc123"]
                
                secretNamespace:
                  type: string
                  description: "Namespace of the Secret"
                
                lastRotatedTime:
                  type: string
                  format: date-time
                  description: "Time when the credential was last rotated"
                
                nextRotationTime:
                  type: string
                  format: date-time
                  description: "Time when the next rotation is scheduled"
                
                rotationCount:
                  type: integer
                  description: "Number of times this credential has been rotated"
                  default: 0
                
                lastAccessedTime:
                  type: string
                  format: date-time
                  description: "Time when the credential was last accessed"
                
                accessCount:
                  type: integer
                  description: "Number of times this credential has been accessed"
                  default: 0
                
                lastError:
                  type: object
                  properties:
                    message:
                      type: string
                    
                    time:
                      type: string
                      format: date-time
                    
                    count:
                      type: integer
                      default: 0
                
                metrics:
                  type: object
                  properties:
                    ageDays:
                      type: number
                      description: "Age of the credential in days"
                    
                    daysUntilExpiration:
                      type: integer
                      description: "Days until credential expires"
                    
                    isExpiringSoon:
                      type: boolean
                      description: "Whether the credential is expiring soon"

  scope: Namespaced
  names:
    plural: botcredentials
    singular: botcredential
    kind: BotCredential
    shortNames:
      - bc
      - cred

---
# References: docs/omen/strategy.json (Application Goal AG001, Security Goal AG004)
# References: docs/adr/architecture-decisions.md (ADR-001, ADR-004)
# References: features/chatbot.feature (BDD scenarios)
