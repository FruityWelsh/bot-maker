---
# ChatBot Custom Resource Definition
# =================================
# Defines the ChatBot resource for managing chat bot lifecycles
# References: docs/omen/strategy.json (Application Goal AG001)
# References: docs/adr/architecture-decisions.md (ADR-001, ADR-002)
# References: features/chatbot.feature (BDD scenarios)

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chatbots.chatbotoperator.io
  labels:
    app: chatbot-operator
    version: v1alpha1
    group: chatbotoperator.io
    kind: ChatBot
  annotations:
    description: "ChatBot resource defines a chat bot instance to be managed by the ChatBot Operator"
    author: "Strategy Coder"
    version: "Generated from Git commit date"
    references: "docs/omen/strategy.json, docs/adr/architecture-decisions.md, features/chatbot.feature"

spec:
  group: chatbotoperator.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - platform
                - name
                - configuration
              properties:
                platform:
                  type: string
                  description: "The chat platform for this bot (slack, matrix, discord, twilio)"
                  enum: [slack, matrix, discord, twilio]
                  examples: ["slack"]
                
                name:
                  type: string
                  description: "The name of the chat bot"
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
                  examples: ["customer-support-bot"]
                
                displayName:
                  type: string
                  description: "The display name of the bot (user-friendly)"
                  maxLength: 100
                  examples: ["Customer Support Bot"]
                
                description:
                  type: string
                  description: "Description of the bot's purpose"
                  maxLength: 500
                  examples: ["Handles customer support inquiries"]
                
                configuration:
                  type: object
                  description: "Platform-specific configuration for the bot"
                  required:
                    - backendURL
                  properties:
                    backendURL:
                      type: string
                      description: "URL of the backend service that handles bot logic"
                      format: uri
                      examples: ["https://backend.example.com/webhook"]
                    
                    webhookPath:
                      type: string
                      description: "Path for incoming webhooks"
                      default: "/webhook"
                      examples: ["/webhook/slack"]
                    
                    rateLimit:
                      type: integer
                      description: "Maximum messages per minute"
                      minimum: 1
                      maximum: 1000
                      default: 100
                    
                    timeoutSeconds:
                      type: integer
                      description: "Request timeout in seconds"
                      minimum: 5
                      maximum: 300
                      default: 30
                
                credentials:
                  type: object
                  description: "Reference to credentials for the platform"
                  required:
                    - secretName
                  properties:
                    secretName:
                      type: string
                      description: "Name of the Kubernetes Secret containing credentials"
                      examples: ["slack-credentials"]
                    
                    secretNamespace:
                      type: string
                      description: "Namespace of the Secret (defaults to same as ChatBot)"
                      default: ""
                
                labels:
                  type: object
                  description: "Labels for the bot resource"
                  additionalProperties:
                    type: string
                  examples: [{"team": "support", "environment": "production"}]
                
                annotations:
                  type: object
                  description: "Annotations for the bot resource"
                  additionalProperties:
                    type: string
                
                enabled:
                  type: boolean
                  description: "Whether the bot is enabled"
                  default: true
                
                tls:
                  type: object
                  description: "TLS configuration for the bot"
                  properties:
                    enabled:
                      type: boolean
                      description: "Whether to use TLS"
                      default: true
                    
                    certManager:
                      type: object
                      description: "Cert-Manager configuration for automatic certificate provisioning"
                      properties:
                        enabled:
                          type: boolean
                          default: true
                        
                        issuerName:
                          type: string
                          description: "Name of the Cert-Manager Issuer"
                          default: "letsencrypt-prod"
                        
                        issuerKind:
                          type: string
                          description: "Kind of the Cert-Manager Issuer"
                          default: "ClusterIssuer"
                
                monitoring:
                  type: object
                  description: "Monitoring configuration"
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    
                    metrics:
                      type: object
                      description: "Metrics configuration"
                      properties:
                        enabled:
                          type: boolean
                          default: true
                        
                        port:
                          type: integer
                          description: "Metrics port"
                          default: 9090
                
                resources:
                  type: object
                  description: "Resource requirements for the bot deployment"
                  properties:
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "500m"
                          examples: ["500m", "1"]
                        
                        memory:
                          type: string
                          default: "256Mi"
                          examples: ["256Mi", "1Gi"]
                    
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "100m"
                        
                        memory:
                          type: string
                          default: "128Mi"
            
            status:
              type: object
              description: "Status of the ChatBot resource"
              properties:
                phase:
                  type: string
                  description: "Current phase of the ChatBot lifecycle"
                  enum: [Pending, Provisioning, Ready, Updating, Terminating, Failed, Deleted]
                  examples: ["Ready"]
                
                message:
                  type: string
                  description: "Human-readable message about the current status"
                  examples: ["Bot provisioned successfully"]
                
                reason:
                  type: string
                  description: "Machine-readable reason for the current status"
                  examples: ["ProvisioningComplete"]
                
                lastTransitionTime:
                  type: string
                  format: date-time
                  description: "Time of the last status transition"
                
                provisioningStartTime:
                  type: string
                  format: date-time
                  description: "Time when provisioning started"
                
                readyTime:
                  type: string
                  format: date-time
                  description: "Time when the bot became ready"
                
                botID:
                  type: string
                  description: "Unique identifier for the bot on the platform"
                  examples: ["U12345678"]
                
                botToken:
                  type: string
                  description: "Reference to the Secret containing the bot token"
                  examples: ["slack-bot-token-abc123"]
                
                webhookURL:
                  type: string
                  description: "URL for incoming webhooks"
                  format: uri
                  examples: ["https://chatbot-operator.example.com/webhook/slack/abc123"]
                
                lastError:
                  type: object
                  description: "Information about the last error, if any"
                  properties:
                    message:
                      type: string
                    
                    time:
                      type: string
                      format: date-time
                    
                    count:
                      type: integer
                      description: "Number of times this error has occurred"
                      default: 0
                
                metrics:
                  type: object
                  description: "Metrics for this bot"
                  properties:
                    provisioningTimeSeconds:
                      type: number
                      description: "Time taken to provision the bot"
                      examples: [45.2]
                    
                    messagesProcessed:
                      type: integer
                      description: "Total messages processed"
                      default: 0
                    
                    errors:
                      type: integer
                      description: "Total errors encountered"
                      default: 0
                    
                    lastMessageTime:
                      type: string
                      format: date-time
                      description: "Time of the last processed message"
      
      subresources:
        status: {}
      
      additionalPrinterColumns:
        - name: Platform
          type: string
          jsonPath: .spec.platform
        - name: Name
          type: string
          jsonPath: .spec.name
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
        - name: Bot ID
          type: string
          jsonPath: .status.botID

  scope: Namespaced
  names:
    plural: chatbots
    singular: chatbot
    kind: ChatBot
    shortNames:
      - cb
      - bot

---
# References: docs/omen/strategy.json (Application Goal AG001)
# References: docs/adr/architecture-decisions.md (ADR-001)
# References: features/chatbot.feature (BDD scenarios)
