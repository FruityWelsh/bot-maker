name: ChatBot Operator CI

# Platform-agnostic CI workflow
# This workflow uses reusable Make targets that work across:
# - Local development (make)
# - GitHub Actions (this file)
# - Tekton pipelines
# - GitLab CI/CD
# - VSCode tasks
#
# Strategy First, Code Second: This CI/CD pipeline implements the strategy defined in:
# - docs/omen/strategy.json (Developer Goal DG002 - Formal Verification)
# - docs/adr/architecture-decisions.md (ADR-001 - Strategy First, Code Second)
# - docs/STRATEGY.md (Core Principles: Strategy First, Code Second)
# - docs/IMPLEMENTATION_PLAN.md (Implementation guidance)
#
# Architecture: Platform-agnostic CI/CD as per ADR-007 and ADR-016

on:
  push:
    branches: [ main, vibe/* ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================================
  # JOB 1: Checkout & Strategy Validation
  # Strategy: Validates the strategy-to-code chain before any execution (ADR-001)
  # ============================================================================
  checkout:
    name: 📥 Checkout & Strategy Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate Strategy Chain (Strategy First, Code Second - ADR-001)
        run: |
          echo "🔗 Validating Strategy-to-Code Chain"
          echo "   References: docs/omen/strategy.json, docs/adr/architecture-decisions.md"
          node scripts/validation/check-strategy-chain.js
      
      - name: Validate Toolchain References (ADR-008, ADR-009, ADR-010, ADR-011)
        run: |
          echo "🔧 Validating Toolchain Hard References"
          node scripts/validation/validate-toolchain.js
      
      - name: Validate Dates (No manual dates per CONTRIBUTING.md)
        run: |
          echo "📅 Validating Date References"
          node scripts/validation/validate-dates.js
      
      - name: Update Git commit dates in documentation
        run: |
          chmod +x ./scripts/update-commit-dates.sh
          ./scripts/update-commit-dates.sh --verbose
          git diff --name-only || true

  # ============================================================================
  # JOB 2: Setup Environment
  # Architecture: Sets up the development environment as per docs/STRATEGY.md
  # ============================================================================
  setup:
    name: 🛠️ Setup Environment
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies (Make target: deps)
        run: make deps

  # ============================================================================
  # JOB 3: Linting
  # Strategy: Code quality validation per docs/STRATEGY.md
  # ============================================================================
  lint:
    name: 🧹 Linting
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Linting (Make target: lint)
        run: make lint

  # ============================================================================
  # JOB 4: Unit Tests
  # Strategy: Go unit tests for API types and controller
  # ============================================================================
  test-unit:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Unit Tests (Make target: test-unit)
        run: make test-unit

  # ============================================================================
  # JOB 5: Validation Tests
  # Strategy: Jest/AJV validation tests for CRD and toolchain documents
  # ============================================================================
  test-validation:
    name: ✅ Validation Tests
    runs-on: ubuntu-latest
    needs: test-unit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Validation Tests (Make target: test-validation)
        run: make test-validation

  # ============================================================================
  # JOB 6: Strategy Chain Validation
  # Strategy: Validates strategy-to-code chain (ADR-001)
  # ============================================================================
  test-strategy-chain:
    name: 🔗 Strategy Chain Validation
    runs-on: ubuntu-latest
    needs: test-unit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate Strategy Chain (Make target: test-strategy-chain)
        run: make test-strategy-chain

  # ============================================================================
  # JOB 7: Toolchain Validation
  # Strategy: Validates all 8 toolchain tools with hard references
  # ============================================================================
  test-toolchain:
    name: 🔧 Toolchain Validation
    runs-on: ubuntu-latest
    needs: test-unit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate Toolchain (Make target: test-toolchain)
        run: make test-toolchain

  # ============================================================================
  # JOB 8: Date Validation
  # Strategy: Validates no manual dates per CONTRIBUTING.md
  # ============================================================================
  test-dates:
    name: 📅 Date Validation
    runs-on: ubuntu-latest
    needs: test-unit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate Dates (Make target: test-dates)
        run: make test-dates

  # ============================================================================
  # JOB 9: Build
  # Architecture: Build the operator binary
  # ============================================================================
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-validation, test-strategy-chain, test-toolchain, test-dates]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Build Project (Make target: build)
        run: make build

  # ============================================================================
  # JOB 10: Security Scanning
  # Strategy: Security scanning per docs/STRATEGY.md (Zero Trust)
  # ============================================================================
  scan-security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Security Scan (Make target: scan-security)
        run: make scan-security || true

  # ============================================================================
  # JOB 11: Vulnerability Scanning
  # Strategy: Vulnerability scanning per docs/STRATEGY.md (SLSA compliance)
  # ============================================================================
  scan-vulnerability:
    name: 🛡️ Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Vulnerability Scan (Make target: scan-vulnerability)
        run: make scan-vulnerability || true

  # ============================================================================
  # JOB 12: CNCF Compliance Validation
  # Strategy: Validates CNCF graduated project compliance
  # ============================================================================
  test-cncf-compliance:
    name: 🏆 CNCF Compliance
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate CNCF Compliance (Make target: test-cncf-compliance)
        run: make test-cncf-compliance || true

  # ============================================================================
  # JOB 13: Artifact Signing
  # Strategy: SLSA compliance - artifact signing
  # ============================================================================
  sign:
    name: ✍️ Sign Artifacts
    runs-on: ubuntu-latest
    needs: [build, scan-security, scan-vulnerability]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Sign Artifacts (Make target: sign)
        run: make sign || true

  # ============================================================================
  # JOB 14: Container Packaging
  # Architecture: Container packaging per ADR-002 (Kubebuilder)
  # ============================================================================
  package:
    name: 🐳 Package Container
    runs-on: ubuntu-latest
    needs: sign
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Package Container Image (Make target: package)
        run: make package || true

  # ============================================================================
  # JOB 15: SBOM Generation
  # Strategy: SBOM generation for supply chain security
  # ============================================================================
  generate-sbom:
    name: 📋 Generate SBOM
    runs-on: ubuntu-latest
    needs: package
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Generate SBOM (Make target: generate-sbom)
        run: make generate-sbom || true

  # ============================================================================
  # JOB 16: Provenance Generation
  # Strategy: Provenance generation for SLSA compliance
  # ============================================================================
  generate-provenance:
    name: 📜 Generate Provenance
    runs-on: ubuntu-latest
    needs: package
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Generate Provenance (Make target: generate-provenance)
        run: make generate-provenance || true
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            dist/
            coverage/
            reports/
            *.sbom
            *.sig
            *.attestation
