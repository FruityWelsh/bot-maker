name: ChatBot Operator CI

# Platform-agnostic CI workflow
# Key values: Reproducibility, Repeatability, Strategy First, Code Second
# This workflow wraps Make targets that work across all platforms

on:
  push:
    branches: [ main, ai-dev, vibe/* ]
  pull_request:
    branches: [ main, ai-dev ]

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    
    env:
      CI_PLATFORM: github
      CI_COMMIT: ${{ github.sha }}
      CI_BRANCH: ${{ github.ref_name }}
      CI_REPO: ${{ github.repository }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Update Git commit dates in documentation
        run: |
          # Replace "2026-05-25" placeholders with actual commit dates
          chmod +x ./scripts/update-commit-dates.sh
          ./scripts/update-commit-dates.sh --verbose
          
          # Show what was changed
          git diff --name-only || true
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Validate Strategy Chain (Make target)
        run: make test-strategy-chain
      
      - name: Validate Toolchain (Make target)
        run: make test-toolchain
      
      - name: Validate No Manual Dates (Make target)
        run: make test-dates
      
      - name: Run Validation Tests (Make target)
        run: make test-validation || true
