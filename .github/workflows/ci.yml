name: ChatBot Operator CI

# Platform-agnostic CI workflow
# Key values: Reproducibility, Repeatability, Strategy First, Code Second

on:
  push:
    branches: [ main, vibe/* ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    
    env:
      CI_PLATFORM: github
      CI_COMMIT: ${{ github.sha }}
      CI_BRANCH: ${{ github.ref_name }}
      CI_REPO: ${{ github.repository }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Validate Strategy Chain
        run: node scripts/validation/check-strategy-chain.js
      
      - name: Validate No Manual Dates
        run: npx jest tests/validation/dates.test.js --forceExit
      
      - name: Run Validation Tests
        run: npx jest tests/schemas/validation.js --forceExit || true
      
      - name: Run Tool Tests
        run: npx jest tests/tools/ --forceExit || true
