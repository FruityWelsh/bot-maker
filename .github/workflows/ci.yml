name: ChatBot Operator CI

# Platform-agnostic CI workflow
# This workflow uses reusable Make targets that work across:
# - Local development (make)
# - GitHub Actions (this file)
# - Tekton pipelines
# - GitLab CI/CD
# - VSCode tasks

on:
  push:
    branches: [ main, vibe/* ]
  pull_request:
    branches: [ main ]

jobs:
  # Reusable job that calls Make targets
  # Each platform (GitHub, GitLab, Tekton) wraps these same targets
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    
    # These environment variables make the Make targets platform-aware
    env:
      CI_PLATFORM: github
      CI_COMMIT: ${{ github.sha }}
      CI_BRANCH: ${{ github.ref_name }}
      CI_REPO: ${{ github.repository }}
      CI_WORKFLOW: ${{ github.workflow }}
      CI_RUN_ID: ${{ github.run_id }}
      CI_RUN_NUMBER: ${{ github.run_number }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full history for proper versioning
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: go.sum
      
      - name: Set up Node.js (for Jest/AJV tests)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          # Platform-agnostic dependency installation
          make deps
      
      - name: Lint
        run: |
          # Platform-agnostic linting
          make lint
      
      - name: Test - Unit Tests
        run: |
          # Platform-agnostic unit tests
          make test-unit
      
      - name: Test - Integration Tests
        run: |
          # Platform-agnostic integration tests
          make test-integration
      
      - name: Test - Validation Tests
        run: |
          # Platform-agnostic validation (Jest/AJV)
          make test-validation
      
      - name: Test - Behavior Tests
        run: |
          # Platform-agnostic behavior tests (Godog)
          make test-behavior
      
      - name: Build
        run: |
          # Platform-agnostic build
          make build
      
      - name: Scan - Security
        run: |
          # Platform-agnostic security scanning
          make scan-security
      
      - name: Scan - Vulnerability
        run: |
          # Platform-agnostic vulnerability scanning
          make scan-vulnerability
      
      - name: Sign - Artifacts
        run: |
          # Platform-agnostic artifact signing
          make sign
      
      - name: Package - Container Image
        run: |
          # Platform-agnostic container packaging
          make package
      
      - name: Generate - SBOM
        run: |
          # Platform-agnostic SBOM generation
          make generate-sbom
      
      - name: Generate - Provenance
        run: |
          # Platform-agnostic provenance generation
          make generate-provenance
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            dist/
            coverage/
            reports/
            *.sbom
            *.sig
            *.attestation
