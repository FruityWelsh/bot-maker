name: ChatBot Operator CI

# Platform-agnostic CI workflow
# This workflow uses reusable Make targets that work across:
# - Local development make
# - GitHub Actions this file
# - Tekton pipelines
# - GitLab CI/CD
# - VSCode tasks
#
# Strategy First, Code Second: This CI/CD pipeline implements the strategy defined in:
# - docs/strategy/omen/strategy.json Developer Goal DG002 - Formal Verification
# - docs/contributors/adr/architecture-decisions.md ADR-001 - Strategy First, Code Second
# - docs/strategy/STRATEGY.md Core Principles: Strategy First, Code Second
# - docs/devx/IMPLEMENTATION_PLAN.md Implementation guidance
#
# Architecture: Platform-agnostic CI/CD as per ADR-007 and ADR-016
#
# Pipeline Flow:
# 0. Build Security Scanner Container (FIRST - must complete before all other jobs)
# 1. Data Loss Prevention (DLP) - Secret scanning and malicious code checks (HARD BLOCK)
# 2. DLP Tests - Tests that validate the scan jobs themselves (HARD BLOCK)
# 3. Validation - Strategy-to-BDD stack and DevX tools validation (HARD BLOCK)
# 4. Execution - DevX tools act on validated application code (HARD BLOCK)
# 5. Artifact Handling - Sign, package, and deploy artifacts
#
# IMPORTANT: NO BYPASS METHODS. All jobs must pass. Test in pipeline.
# Container build is FIRST to ensure it's available for scan jobs.

on:
  push:
    branches: [ main, ai-dev, vibe/* ]
  pull_request:
    branches: [ main, ai-dev ]

jobs:
  # ============================================================================
  # PHASE 0: BUILD SECURITY SCANNER CONTAINER
  # Build and publish the container with all security tools pre-installed
  # This MUST complete first so all other jobs can use it
  # ============================================================================
  
  build-security-container:
    name: Build Security Scanner Container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push Security Scanner Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.security-scanner
          push: true
          tags: ghcr.io/fruitywelsh/security-scanner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # PHASE 1: DATA LOSS PREVENTION (DLP) AND SECURITY
  # Priority: Run security checks FIRST to prevent data loss and detect issues early
  # These jobs are REQUIRED and HARD BLOCK - no bypass allowed
  # All jobs use the pre-built security scanner container
  # ============================================================================
  
  scan-secrets:
    name: Secret Scanning (DLP)
    runs-on: ubuntu-latest
    needs: build-security-container
    container: ghcr.io/fruitywelsh/security-scanner:latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Update Git commit dates in documentation
        run: ./scripts/update-commit-dates.sh --verbose
      
      - name: Run Secret Scan
        run: make scan-secrets

  scan-security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build-security-container
    container: ghcr.io/fruitywelsh/security-scanner:latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Security Scans
        run: make scan-security

  scan-vulnerability:
    name: Vulnerability Scanning
    runs-on: ubuntu-latest
    needs: build-security-container
    container: ghcr.io/fruitywelsh/security-scanner:latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Vulnerability Scans
        run: make scan-vulnerability

  # ============================================================================
  # PHASE 2: DLP TESTS - Tests that validate the scan jobs themselves
  # Priority: Validate that security scans work correctly before proceeding
  # These jobs REQUIRE all Phase 1 (DLP) jobs to pass first - HARD BLOCK
  # ============================================================================
  
  test-tools:
    name: DevX Tool Tests
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability]
    container: ghcr.io/fruitywelsh/security-scanner:latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run DevX Tool Tests
        run: make test-tools

  # ============================================================================
  # PHASE 3: VALIDATION - Strategy-to-BDD Stack and DevX Tools
  # Priority: Validate all strategy and toolchain references before execution
  # These jobs REQUIRE both Phase 1 (DLP) jobs AND Phase 2 (DLP Tests) to pass first - HARD BLOCK
  # ============================================================================
  
  validate-strategy:
    name: Strategy Chain Validation
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability, test-tools]
    container: ghcr.io/fruitywelsh/security-scanner:latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate Strategy Chain
        run: make test-strategy-chain

  validate-toolchain:
    name: Toolchain Validation
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability, test-tools]
    container: ghcr.io/fruitywelsh/security-scanner:latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate Toolchain
        run: make test-toolchain

  validate-dates:
    name: Date Validation
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability, test-tools]
    container: ghcr.io/fruitywelsh/security-scanner:latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate Dates
        run: make test-dates

  test-validation:
    name: Validation Tests
    runs-on: ubuntu-latest
    needs: [validate-strategy, validate-toolchain, validate-dates]
    container: ghcr.io/fruitywelsh/security-scanner:latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Validation Tests
        run: make test-validation

  # ============================================================================
  # PHASE 4: EXECUTION - DevX Tools Act on Validated Application Code
  # Priority: Only run after all security, DLP tests, and validation checks pass - HARD BLOCK
  # These jobs need Go and Node.js, so they run on ubuntu-latest (not in container yet)
  # TODO: Once container is working, extend it with Go and use it here too
  # ============================================================================
  
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability, test-tools, validate-strategy, validate-toolchain, validate-dates]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps

  lint:
    name: Linting
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Linting
        run: make lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Unit Tests
        run: make test-unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-validation]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Build Project
        run: make build

  test-cncf-compliance:
    name: CNCF Compliance
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate CNCF Compliance
        run: make test-cncf-compliance

  # ============================================================================
  # PHASE 5: ARTIFACT HANDLING
  # ============================================================================

  # JOB: Sign Artifacts - Sign built artifacts with Cosign
  sign-artifacts:
    name: Sign Artifacts
    runs-on: ubuntu-latest
    needs: [build, test-cncf-compliance]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3
      
      - name: Sign artifacts
        run: make ci-sign

  # JOB: Publish Artifacts - Publish Docker images and binaries
  publish-artifacts:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    needs: sign-artifacts
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Publish Docker image
        run: make ci-package

  # JOB: Deploy to Cluster - Manual deployment
  deploy:
    name: Deploy to Cluster
    runs-on: ubuntu-latest
    needs: publish-artifacts
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://your-cluster.example.com
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Deploy
        run: make ci-deploy

  # JOB: Upload Artifacts - Always upload for inspection
  upload:
    name: Upload Artifacts
    runs-on: ubuntu-latest
    needs: [sign-artifacts, test-cncf-compliance]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: "dist/ coverage/ reports/ *.sbom *.sig *.attestation"
