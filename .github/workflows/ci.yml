name: ChatBot Operator CI

# Platform-agnostic CI workflow
# Key values: Reproducibility, Repeatability, Strategy First, Code Second
# This workflow wraps Make targets that work across all platforms

on:
  push:
    branches: [ main, vibe/* ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================================
  # JOB 1: Checkout and Prepare
  # ============================================================================
  checkout:
    name: 📥 Checkout & Prepare
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Update Git commit dates in documentation
        run: |
          chmod +x ./scripts/update-commit-dates.sh
          ./scripts/update-commit-dates.sh --verbose
          git diff --name-only || true

  # ============================================================================
  # JOB 2: Strategy Chain Validation (Node.js only)
  # ============================================================================
  validate-strategy:
    name: 🎯 Strategy Chain Validation
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node.js dependencies
        run: npm install
      
      - name: Validate Strategy Chain
        run: make test-strategy-chain

  # ============================================================================
  # JOB 3: Toolchain Validation (Node.js only)
  # ============================================================================
  validate-toolchain:
    name: 🔧 Toolchain Validation
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node.js dependencies
        run: npm install
      
      - name: Validate Toolchain
        run: make test-toolchain

  # ============================================================================
  # JOB 4: Date Validation (Node.js only)
  # ============================================================================
  validate-dates:
    name: 📅 Date Validation
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node.js dependencies
        run: npm install
      
      - name: Validate No Manual Dates
        run: make test-dates

  # ============================================================================
  # JOB 5: Validation Tests (Node.js only)
  # ============================================================================
  test-validation:
    name: ✅ Validation Tests
    runs-on: ubuntu-latest
    needs: [validate-strategy, validate-toolchain, validate-dates]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node.js dependencies
        run: npm install
      
      - name: Run Validation Tests
        run: make test-validation || true
      
      - name: Run Tekton CI (best effort)
        run: make tekton-ci || true

  # ============================================================================
  # JOB 6: Full CI Pipeline (Go + Node.js)
  # This job runs all the Go-based targets that need Go toolchain
  # ============================================================================
  ci-pipeline:
    name: 🚀 Full CI Pipeline
    runs-on: ubuntu-latest
    needs: [validate-strategy, validate-toolchain, validate-dates, test-validation]
    
    env:
      CI_PLATFORM: github
      CI_COMMIT: ${{ github.sha }}
      CI_BRANCH: ${{ github.ref_name }}
      CI_REPO: ${{ github.repository }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps || true
      
      - name: Lint
        run: make lint
      
      - name: Unit Tests
        run: make test-unit
      
      - name: Integration Tests
        run: make test-integration
      
      - name: Behavior Tests
        run: make test-behavior
      
      - name: Build
        run: make build
      
      - name: Security Scan
        run: make scan-security
      
      - name: Vulnerability Scan
        run: make scan-vulnerability
      
      - name: Sign Artifacts
        run: make sign
      
      - name: Package Container
        run: make package
      
      - name: Generate SBOM
        run: make generate-sbom
      
      - name: Generate Provenance
        run: make generate-provenance
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            dist/
            coverage/
            reports/
            *.sbom
            *.sig
            *.attestation
