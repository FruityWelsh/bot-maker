name: ChatBot Operator CI

# Platform-agnostic CI workflow
# This workflow uses reusable Make targets that work across:
# - Local development (make)
# - GitHub Actions (this file)
# - Tekton pipelines
# - GitLab CI/CD
# - VSCode tasks

on:
  push:
    branches: [ main, vibe/* ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================================
  # JOB 1: Checkout & Prepare
  # ============================================================================
  checkout:
    name: 📥 Checkout & Prepare
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Update Git commit dates in documentation
        run: |
          chmod +x ./scripts/update-commit-dates.sh
          ./scripts/update-commit-dates.sh --verbose
          git diff --name-only || true

  # ============================================================================
  # JOB 2: Setup Environment
  # ============================================================================
  setup:
    name: 🛠️ Setup Environment
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps

  # ============================================================================
  # JOB 3: Linting
  # ============================================================================
  lint:
    name: 🧹 Linting
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Linting
        run: make lint

  # ============================================================================
  # JOB 4: Unit Tests
  # ============================================================================
  test-unit:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Unit Tests
        run: make test-unit

  # ============================================================================
  # JOB 5: Integration Tests
  # ============================================================================
  test-integration:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Integration Tests
        run: make test-integration

  # ============================================================================
  # JOB 6: Validation Tests
  # ============================================================================
  test-validation:
    name: ✅ Validation Tests
    runs-on: ubuntu-latest
    needs: test-unit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Validation Tests
        run: make test-validation

  # ============================================================================
  # JOB 7: Behavior Tests
  # ============================================================================
  test-behavior:
    name: 🐕 Behavior Tests
    runs-on: ubuntu-latest
    needs: test-unit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Behavior Tests
        run: make test-behavior

  # ============================================================================
  # JOB 8: Build
  # ============================================================================
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Build Project
        run: make build

  # ============================================================================
  # JOB 9: Security Scanning
  # ============================================================================
  scan-security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Security Scan
        run: make scan-security

  # ============================================================================
  # JOB 10: Vulnerability Scanning
  # ============================================================================
  scan-vulnerability:
    name: 🛡️ Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Vulnerability Scan
        run: make scan-vulnerability

  # ============================================================================
  # JOB 11: Artifact Signing
  # ============================================================================
  sign:
    name: ✍️ Sign Artifacts
    runs-on: ubuntu-latest
    needs: [build, scan-security, scan-vulnerability]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Sign Artifacts
        run: make sign

  # ============================================================================
  # JOB 12: Container Packaging
  # ============================================================================
  package:
    name: 🐳 Package Container
    runs-on: ubuntu-latest
    needs: sign
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Package Container Image
        run: make package

  # ============================================================================
  # JOB 13: SBOM Generation
  # ============================================================================
  generate-sbom:
    name: 📋 Generate SBOM
    runs-on: ubuntu-latest
    needs: package
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Generate SBOM
        run: make generate-sbom

  # ============================================================================
  # JOB 14: Provenance Generation
  # ============================================================================
  generate-provenance:
    name: 📜 Generate Provenance
    runs-on: ubuntu-latest
    needs: package
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Generate Provenance
        run: make generate-provenance
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            dist/
            coverage/
            reports/
            *.sbom
            *.sig
            *.attestation
