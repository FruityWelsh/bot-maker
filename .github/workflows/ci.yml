name: ChatBot Operator CI

# Platform-agnostic CI workflow
# This workflow uses reusable Make targets that work across:
# - Local development make
# - GitHub Actions this file
# - Tekton pipelines
# - GitLab CI/CD
# - VSCode tasks
#
# Strategy First, Code Second: This CI/CD pipeline implements the strategy defined in:
# - docs/strategy/omen/strategy.json Developer Goal DG002 - Formal Verification
# - docs/contributors/adr/architecture-decisions.md ADR-001 - Strategy First, Code Second
# - docs/strategy/STRATEGY.md Core Principles: Strategy First, Code Second
# - docs/devx/IMPLEMENTATION_PLAN.md Implementation guidance
#
# Architecture: Platform-agnostic CI/CD as per ADR-007 and ADR-016
#
# Pipeline Flow:
# 1. Data Loss Prevention (DLP) - Secret scanning and malicious code checks (HARD BLOCK)
# 2. DLP Tests - Tests that validate the scan jobs themselves (HARD BLOCK)
# 3. Validation - Strategy-to-BDD stack and DevX tools validation (HARD BLOCK)
# 4. Execution - DevX tools act on validated application code (HARD BLOCK)
#
# IMPORTANT: NO BYPASS METHODS. All jobs must pass. Test in pipeline.

on:
  push:
    branches: [ main, ai-dev, vibe/* ]
  pull_request:
    branches: [ main, ai-dev ]

jobs:
  # ============================================================================
  # PHASE 1: DATA LOSS PREVENTION (DLP) AND SECURITY
  # Priority: Run security checks FIRST to prevent data loss and detect issues early
  # These jobs are REQUIRED and HARD BLOCK - no bypass allowed
  # ============================================================================
  
  # JOB 1: Checkout Repository
  # ============================================================================
  checkout:
    name: Checkout Repository
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Update Git commit dates in documentation
        run: ./scripts/update-commit-dates.sh --verbose
  
  # JOB 2: Secret Scanning (Data Loss Prevention) - HARD BLOCK
  # References: docs/contributors/adr/devx-adrs.md ADR-018 - Secret Scanning with Gitleaks
  # ============================================================================
  scan-secrets:
    name: Secret Scanning (DLP)
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install Gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
      
      - name: Run Secret Scan
        run: make scan-secrets
  
  # JOB 3: Security Scanning - HARD BLOCK
  # ============================================================================
  scan-security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      
      - name: Run Security Scans
        run: make scan-security
  
  # JOB 4: Vulnerability Scanning - HARD BLOCK
  # ============================================================================
  scan-vulnerability:
    name: Vulnerability Scanning
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      
      - name: Run Vulnerability Scans
        run: make scan-vulnerability

  # ============================================================================
  # PHASE 2: DLP TESTS - Tests that validate the scan jobs themselves
  # Priority: Validate that security scans work correctly before proceeding
  # These jobs REQUIRE all Phase 1 (DLP) jobs to pass first - HARD BLOCK
  # ============================================================================
  
  # JOB 5: Tool Tests (DevX Tools) - Tests the scan jobs themselves - HARD BLOCK
  # References: docs/contributors/adr/devx-adrs.md ADR-010 - Behavior-Driven Development with Godog
  # References: tests/tools/security-dlp.test.js - Security and DLP pipeline tests
  # ============================================================================
  test-tools:
    name: DevX Tool Tests
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run DevX Tool Tests
        run: make test-tools

  # ============================================================================
  # PHASE 3: VALIDATION - Strategy-to-BDD Stack and DevX Tools
  # Priority: Validate all strategy and toolchain references before execution
  # These jobs REQUIRE both Phase 1 (DLP) jobs AND Phase 2 (DLP Tests) to pass first - HARD BLOCK
  # ============================================================================
  
  # JOB 6: Strategy Chain Validation - HARD BLOCK
  # References: docs/contributors/adr/architecture-decisions.md ADR-001 - Strategy First, Code Second
  # ============================================================================
  validate-strategy:
    name: Strategy Chain Validation
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability, test-tools]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate Strategy Chain
        run: make test-strategy-chain
  
  # JOB 7: Toolchain Validation - HARD BLOCK
  # References: docs/contributors/adr/architecture-decisions.md ADR-008 - Business Metrics with Cube.js
  # ============================================================================
  validate-toolchain:
    name: Toolchain Validation
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability, test-tools]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate Toolchain
        run: make test-toolchain
  
  # JOB 8: Date Validation - HARD BLOCK
  # References: CONTRIBUTING.md - No manual dates rule
  # ============================================================================
  validate-dates:
    name: Date Validation
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability, test-tools]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate Dates
        run: make test-dates
  
  # JOB 9: Validation Tests (Jest/AJV) - HARD BLOCK
  # References: docs/contributors/adr/devx-adrs.md ADR-011 - JSON Schema Validation with AJV
  # ============================================================================
  test-validation:
    name: Validation Tests
    runs-on: ubuntu-latest
    needs: [validate-strategy, validate-toolchain, validate-dates]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Validation Tests
        run: make test-validation

  # ============================================================================
  # PHASE 4: EXECUTION - DevX Tools Act on Validated Application Code
  # Priority: Only run after all security, DLP tests, and validation checks pass - HARD BLOCK
  # ============================================================================
  
  # JOB 10: Setup Environment - HARD BLOCK
  # ============================================================================
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability, test-tools, validate-strategy, validate-toolchain, validate-dates]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
  
  # JOB 11: Linting - HARD BLOCK
  # ============================================================================
  lint:
    name: Linting
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Linting
        run: make lint
  
  # JOB 12: Unit Tests - HARD BLOCK
  # ============================================================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Run Unit Tests
        run: make test-unit
  
  # JOB 13: Build - HARD BLOCK
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-validation]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps
      
      - name: Build Project
        run: make build
  
  # JOB 14: CNCF Compliance Validation - HARD BLOCK
  # References: docs/contributors/adr/devx-adrs.md ADR-019 - CNCF Graduated Project Compliance Validation
  # ============================================================================
  test-cncf-compliance:
    name: CNCF Compliance
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate CNCF Compliance
        run: make test-cncf-compliance

  # ============================================================================
  # PHASE 5: ARTIFACT HANDLING
  # ============================================================================
  
  # JOB 15: Upload Artifacts
  # ============================================================================
  upload:
    name: Upload Artifacts
    runs-on: ubuntu-latest
    needs: [build, test-cncf-compliance]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: "dist/ coverage/ reports/ *.sbom *.sig *.attestation"
