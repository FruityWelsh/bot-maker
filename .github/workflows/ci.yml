name: ChatBot Operator CI

# Platform-agnostic CI workflow
# This workflow uses reusable Make targets that work across:
# - Local development make
# - GitHub Actions this file
# - Tekton pipelines
# - GitLab CI/CD
# - VSCode tasks
#
# Strategy First, Code Second: This CI/CD pipeline implements the strategy defined in:
# - docs/strategy/omen/strategy.json Developer Goal DG002 - Formal Verification
# - docs/contributors/adr/architecture-decisions.md ADR-001 - Strategy First, Code Second
# - docs/strategy/STRATEGY.md Core Principles: Strategy First, Code Second
# - docs/devx/IMPLEMENTATION_PLAN.md Implementation guidance
#
# Architecture: Platform-agnostic CI/CD as per ADR-007 and ADR-016
#
# Pipeline Flow:
# 1. Data Loss Prevention (DLP) - Secret scanning and malicious code checks
# 2. Validation - Strategy-to-BDD stack and DevX tools validation
# 3. Execution - DevX tools act on validated application code

on:
  push:
    branches: [ main, ai-dev, vibe/* ]
  pull_request:
    branches: [ main, ai-dev ]

jobs:
  # ============================================================================
  # PHASE 1: DATA LOSS PREVENTION (DLP) AND SECURITY
  # Priority: Run security checks FIRST to prevent data loss and detect issues early
  # ============================================================================
  
  # JOB 1: Checkout Repository
  # ============================================================================
  checkout:
    name: Checkout Repository
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Update Git commit dates in documentation
        run: ./scripts/update-commit-dates.sh --verbose || true
  
  # JOB 2: Secret Scanning (Data Loss Prevention)
  # References: docs/contributors/adr/devx-adrs.md ADR-018 - Secret Scanning with Gitleaks
  # ============================================================================
  scan-secrets:
    name: Secret Scanning (DLP)
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Secret Scan
        run: make scan-secrets || true
  
  # JOB 3: Security Scanning
  # ============================================================================
  scan-security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Run Security Scans
        run: make scan-security || true
  
  # JOB 4: Vulnerability Scanning
  # ============================================================================
  scan-vulnerability:
    name: Vulnerability Scanning
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Run Vulnerability Scans
        run: make scan-vulnerability || true

  # ============================================================================
  # PHASE 2: VALIDATION - Strategy-to-BDD Stack and DevX Tools
  # Priority: Validate all strategy and toolchain references before execution
  # ============================================================================
  
  # JOB 5: Strategy Chain Validation
  # References: docs/contributors/adr/architecture-decisions.md ADR-001 - Strategy First, Code Second
  # ============================================================================
  validate-strategy:
    name: Strategy Chain Validation
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate Strategy Chain
        run: make test-strategy-chain
  
  # JOB 6: Toolchain Validation
  # References: docs/contributors/adr/architecture-decisions.md ADR-008 - Business Metrics with Cube.js
  # ============================================================================
  validate-toolchain:
    name: Toolchain Validation
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate Toolchain
        run: make test-toolchain
  
  # JOB 7: Date Validation
  # References: CONTRIBUTING.md - No manual dates rule
  # ============================================================================
  validate-dates:
    name: Date Validation
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate Dates
        run: make test-dates
  
  # JOB 8: Validation Tests (Jest/AJV)
  # References: docs/contributors/adr/devx-adrs.md ADR-011 - JSON Schema Validation with AJV
  # ============================================================================
  test-validation:
    name: Validation Tests
    runs-on: ubuntu-latest
    needs: [validate-strategy, validate-toolchain, validate-dates]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Run Validation Tests
        run: make test-validation || true
  
  # JOB 9: Tool Tests (DevX Tools)
  # References: docs/contributors/adr/devx-adrs.md ADR-010 - Behavior-Driven Development with Godog
  # ============================================================================
  test-tools:
    name: DevX Tool Tests
    runs-on: ubuntu-latest
    needs: [validate-strategy, validate-toolchain, validate-dates]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Run DevX Tool Tests
        run: make test-tools || true

  # ============================================================================
  # PHASE 3: EXECUTION - DevX Tools Act on Validated Application Code
  # Priority: Only run after all security and validation checks pass
  # ============================================================================
  
  # JOB 10: Setup Environment
  # ============================================================================
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    needs: [scan-secrets, scan-security, scan-vulnerability, validate-strategy, validate-toolchain, validate-dates]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps || true
  
  # JOB 11: Linting
  # ============================================================================
  lint:
    name: Linting
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps || true
      
      - name: Run Linting
        run: make lint || true
  
  # JOB 12: Unit Tests
  # ============================================================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps || true
      
      - name: Run Unit Tests
        run: make test-unit || true
  
  # JOB 13: Build
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-validation, test-tools]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make deps || true
      
      - name: Build Project
        run: make build || true
  
  # JOB 14: CNCF Compliance Validation
  # References: docs/contributors/adr/devx-adrs.md ADR-019 - CNCF Graduated Project Compliance Validation
  # ============================================================================
  test-cncf-compliance:
    name: CNCF Compliance
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate CNCF Compliance
        run: make test-cncf-compliance || true

  # ============================================================================
  # PHASE 4: ARTIFACT HANDLING
  # ============================================================================
  
  # JOB 15: Upload Artifacts
  # ============================================================================
  upload:
    name: Upload Artifacts
    runs-on: ubuntu-latest
    needs: [build, test-cncf-compliance, scan-secrets, scan-security, scan-vulnerability, lint, test-unit, test-validation, test-tools]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: "dist/ coverage/ reports/ *.sbom *.sig *.attestation"
