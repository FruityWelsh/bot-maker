apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: chatbot-operator-setup
  labels:
    app: chatbot-operator
    type: ci-task
  annotations:
    description: "Setup task - Installs dependencies. Wraps 'make deps'"
    author: "Strategy Coder"

spec:
  description: |
    Setup Task
    ==========
    Installs all dependencies for the ChatBot Operator.
    This is just a wrapper around: make deps
  
  params:
    - name: git-url
      type: string
      description: Git repository URL
      default: "https://github.com/FruityWelsh/bot-maker.git"
    
    - name: git-revision
      type: string
      description: Git commit SHA
      default: "main"

  workspaces:
    - name: source
      description: Source code workspace
    
    - name: artifacts
      description: Build artifacts workspace

  steps:
    - name: checkout
      image: alpine/git
      script: |
        echo "📦 Checking out source code..."
        git clone $(params.git-url) $(workspaces.source.path)
        cd $(workspaces.source.path)
        git checkout $(params.git-revision)
        echo "✅ Source code checked out"
    
    - name: install-deps
      image: alpine:latest
      workingDir: $(workspaces.source.path)
      script: |
        echo "📦 Installing dependencies..."
        apk add --no-cache make git curl nodejs npm go
        
        # Set CI environment variables for Make targets
        export CI_PLATFORM=tekton
        export CI_COMMIT=$(params.git-revision)
        export CI_BRANCH=$(params.git-revision)
        export CI_REPO=$(params.git-url)
        
        # Install dependencies using Make targets
        make deps
        echo "✅ Dependencies installed"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: chatbot-operator-lint
  labels:
    app: chatbot-operator
    type: ci-task
  annotations:
    description: "Lint task - Runs all linting checks. Wraps 'make ci-lint'"
    author: "Strategy Coder"

spec:
  description: |
    Lint Task
    =========
    Runs all linting checks for the ChatBot Operator.
    This is just a wrapper around: make ci-lint
  
  workspaces:
    - name: source
      description: Source code workspace
    
    - name: artifacts
      description: Build artifacts workspace

  steps:
    - name: lint
      image: alpine:latest
      workingDir: $(workspaces.source.path)
      script: |
        echo "🔍 Running linting checks..."
        apk add --no-cache make git curl nodejs npm go yaml python3 py3-pip
        pip install yamllint markdownlint shellcheck
        
        # Set CI environment variables for Make targets
        export CI_PLATFORM=tekton
        
        # Run linting using Make targets
        make ci-lint
        echo "✅ Linting checks passed"

