apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: chatbot-operator-full
  labels:
    app: chatbot-operator
    type: ci-task
  annotations:
    description: "Full pipeline task - Runs everything in one container. Wraps 'make ci'"
    author: "Strategy Coder"

spec:
  description: |
    Full Pipeline Task
    ==================
    Runs the complete CI pipeline in one container.
    This is just a wrapper around: make ci
  
  params:
    - name: git-url
      type: string
      description: Git repository URL
      default: "https://github.com/FruityWelsh/bot-maker.git"
    
    - name: git-revision
      type: string
      description: Git commit SHA
      default: "main"
    
    - name: image-registry
      type: string
      description: Container registry for built images
      default: "ghcr.io"
    
    - name: image-repo
      type: string
      description: Container repository name
      default: "chatbot-operator"

  workspaces:
    - name: source
      description: Source code workspace
    
    - name: artifacts
      description: Build artifacts workspace

  steps:
    - name: checkout
      image: alpine/git
      workingDir: $(workspaces.source.path)
      script: |
        echo "📦 Checking out source code..."
        git clone $(params.git-url) .
        git checkout $(params.git-revision)
        echo "✅ Source code checked out"
    
    - name: full-pipeline
      image: alpine:latest
      workingDir: $(workspaces.source.path)
      script: |
        echo "🚀 Running full pipeline..."
        apk add --no-cache make git curl nodejs npm go docker gosec trivy govulncheck gitleaks cosign
        apk add --no-cache python3 py3-pip
        pip install yamllint markdownlint shellcheck
        
        # Set CI environment variables for Make targets
        export CI_PLATFORM=tekton
        export CI_COMMIT=$(params.git-revision)
        export CI_BRANCH=$(params.git-revision)
        export CI_REPO=$(params.git-url)
        export CONTAINER_REGISTRY=$(params.image-registry)
        export CONTAINER_REPO=$(params.image-repo)
        
        # Run full pipeline using Make targets
        make ci
        echo "✅ Full pipeline complete"

