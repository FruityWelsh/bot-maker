    app: chatbot-operator
    type: ci-task
  annotations:
    description: "Scan task - Runs security scanning. Wraps 'make ci-scan'"
    author: "Strategy Coder"

spec:
  description: |
    Scan Task
    =========
    Runs security scanning for the ChatBot Operator.
    This is just a wrapper around: make ci-scan
  
  workspaces:
    - name: source
      description: Source code workspace
    
    - name: artifacts
      description: Build artifacts workspace

  steps:
    - name: scan
      image: alpine:latest
      workingDir: $(workspaces.source.path)
      script: |
        echo "🔒 Running security scans..."
        apk add --no-cache make git curl nodejs npm go
        apk add --no-cache gosec trivy govulncheck gitleaks
        
        # Set CI environment variables for Make targets
        export CI_PLATFORM=tekton
        
        # Run security scanning using Make targets
        make ci-scan
        echo "✅ Security scans passed"

