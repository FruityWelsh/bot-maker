apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: chatbot-operator-build
  labels:
    app: chatbot-operator
    type: ci-task
  annotations:
    description: "Build task - Builds the application. Wraps 'make ci-build'"
    author: "Strategy Coder"

spec:
  description: |
    Build Task
    ==========
    Builds the ChatBot Operator application.
    This is just a wrapper around: make ci-build
  
  params:
    - name: image-registry
      type: string
      description: Container registry for built images
      default: "ghcr.io"
    
    - name: image-repo
      type: string
      description: Container repository name
      default: "chatbot-operator"

  workspaces:
    - name: source
      description: Source code workspace
    
    - name: artifacts
      description: Build artifacts workspace

  steps:
    - name: build
      image: alpine:latest
      workingDir: $(workspaces.source.path)
      script: |
        echo "🔨 Building application..."
        apk add --no-cache make git curl nodejs npm go docker
        
        # Set CI environment variables for Make targets
        export CI_PLATFORM=tekton
        export CONTAINER_REGISTRY=$(params.image-registry)
        export CONTAINER_REPO=$(params.image-repo)
        
        # Build using Make targets
        make ci-build
        echo "✅ Build complete"

