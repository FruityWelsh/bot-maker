# ChatBot Operator GitLab CI/CD Configuration
# ================================================
# This configuration wraps the platform-agnostic Make targets.
# The actual checks are defined in the Makefile.
# GitLab CI is just a wrapper around: make ci-lint, make ci-test, etc.

stages:
  - setup
  - lint
  - test
  - build
  - scan
  - sign
  - package
  - deploy

variables:
  # Platform identification for Make targets
  CI_PLATFORM: gitlab
  CI_COMMIT: $CI_COMMIT_SHA
  CI_BRANCH: $CI_COMMIT_REF_NAME
  CI_REPO: $CI_PROJECT_PATH
  CI_PIPELINE_ID: $CI_PIPELINE_ID
  CI_JOB_ID: $CI_JOB_ID

# Cache configuration for dependencies
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - vendor/
    - node_modules/
    - bin/
    - .cache/

# Setup stage - Install dependencies
setup:
  stage: setup
  image: alpine:latest
  script:
    - echo "📦 Setting up dependencies..."
    - apk add --no-cache make git curl nodejs npm go
    - make deps
  artifacts:
    paths:
      - vendor/
      - node_modules/
      - bin/
    expire_in: 1 hour

# Lint stage - Run all linting checks
lint:
  stage: lint
  image: alpine:latest
  script:
    - echo "🔍 Running linting checks..."
    - apk add --no-cache make git curl nodejs npm go yaml python3 py3-pip
    - pip install yamllint markdownlint shellcheck
    - make ci-lint
  needs: [setup]

# Test stage - Run all tests
test:
  stage: test
  image: alpine:latest
  script:
    - echo "🧪 Running tests..."
    - apk add --no-cache make git curl nodejs npm go
    - make ci-test
  needs: [setup]

# Build stage - Build the application
build:
  stage: build
  image: alpine:latest
  script:
    - echo "🔨 Building application..."
    - apk add --no-cache make git curl nodejs npm go docker
    - make ci-build
  needs: [setup, lint, test]

# Scan stage - Run security scanning
scan:
  stage: scan
  image: alpine:latest
  script:
    - echo "🔒 Running security scans..."
    - apk add --no-cache make git curl nodejs npm go
    - apk add --no-cache gosec trivy govulncheck betterleaks
    - make ci-scan
  needs: [build]

# Sign stage - Sign artifacts
sign:
  stage: sign
  image: alpine:latest
  script:
    - echo "✍️  Signing artifacts..."
    - apk add --no-cache make git curl nodejs npm go cosign
    - make ci-sign
  needs: [scan]

# Package stage - Package artifacts
package:
  stage: package
  image: alpine:latest
  script:
    - echo "📦 Packaging artifacts..."
    - apk add --no-cache make git curl nodejs npm go docker
    - make ci-package
  needs: [sign]

# Deploy stage - Deploy to cluster (manual)
deploy:
  stage: deploy
  image: alpine:latest
  script:
    - echo "🚀 Deploying to cluster..."
    - apk add --no-cache kubectl helm
    - echo "Deploy logic would go here"
    - echo "✅ Deployment complete"
  when: manual
  needs: [package]

# Full pipeline job (runs everything)
full-pipeline:
  stage: setup
  image: alpine:latest
  script:
    - echo "🚀 Running full pipeline..."
    - apk add --no-cache make git curl nodejs npm go docker gosec trivy govulncheck betterleaks cosign kubectl helm
    - apk add --no-cache python3 py3-pip
    - pip install yamllint markdownlint shellcheck
    - make ci
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /run full pipeline/i
      when: always
    - if: $CI_COMMIT_REF_NAME == "main"
      when: never
    - when: never

# Nightly pipeline
nightly:
  stage: setup
  image: alpine:latest
  script:
    - echo "🌙 Running nightly pipeline..."
    - apk add --no-cache make git curl nodejs npm go docker gosec trivy govulncheck betterleaks cosign
    - apk add --no-cache python3 py3-pip
    - pip install yamllint markdownlint shellcheck
    - make ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: never

# Cleanup job
cleanup:
  stage: .post
  image: alpine:latest
  script:
    - echo "🧹 Cleaning up..."
    - make clean
  when: always
