# ChatBot Operator GitLab CI/CD Configuration
# ================================================
# Platform-agnostic CI/CD pipeline for GitLab CI
# This configuration mirrors the GitHub Actions workflow structure
# References: .github/workflows/ci.yml
# References: docs/strategy/omen/strategy.json Developer Goal DG002 - Formal Verification
# References: docs/contributors/adr/architecture-decisions.md
# References: docs/contributors/adr/ADR-020-strategy-first-code-second.md ADR-020 - Strategy First, Code Second
# References: docs/strategy/STRATEGY.md Core Principles: Strategy First, Code Second
# References: docs/devx/IMPLEMENTATION_PLAN.md Implementation guidance
#
# Architecture: Platform-agnostic CI/CD as per ADR-007 and ADR-016
#
# Pipeline Flow:
# 0. Build Security Scanner Container (FIRST - must complete before all other jobs)
# 1. Data Loss Prevention (DLP) - Secret scanning and malicious code checks (HARD BLOCK)
# 2. DLP Tests - Tests that validate the scan jobs themselves (HARD BLOCK)
# 3. Validation - Strategy-to-BDD stack and DevX tools validation (HARD BLOCK)
# 4. Execution - DevX tools act on validated application code (HARD BLOCK)
# 5. Artifact Handling - Sign, package, and deploy artifacts
#
# IMPORTANT: NO BYPASS METHODS. All jobs must pass. Test in pipeline.

# Define stages matching GitHub workflow phases
stages:
  - build-security-container
  - dlp
  - dlp-tests
  - validation
  - execution
  - artifact-handling
  - deploy

# Global variables for all jobs
variables:
  # Platform identification
  CI_PLATFORM: gitlab
  CI_COMMIT: $CI_COMMIT_SHA
  CI_BRANCH: $CI_COMMIT_REF_NAME
  CI_REPO: $CI_PROJECT_PATH
  
  # Docker registry
  DOCKER_REGISTRY: registry.gitlab.com
  DOCKER_IMAGE: ${DOCKER_REGISTRY}/${CI_PROJECT_PATH}/security-scanner:latest

# Cache configuration for dependencies
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - vendor/
    - node_modules/
    - .cache/
  policy: pull-push

# ============================================================================
# PHASE 0: BUILD SECURITY SCANNER CONTAINER
# Build and publish the container with all security tools pre-installed
# This MUST complete first so all other jobs can use it
# ============================================================================

build-security-container:
  stage: build-security-container
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $DOCKER_REGISTRY
  script:
    - echo "🐳 Building Security Scanner Container..."
    - docker build -t ${DOCKER_IMAGE} -f Dockerfile.security-scanner .
    - docker push ${DOCKER_IMAGE}
  tags:
    - docker

# ============================================================================
# PHASE 1: DATA LOSS PREVENTION (DLP) AND SECURITY
# Priority: Run security checks FIRST to prevent data loss and detect issues early
# These jobs are REQUIRED and HARD BLOCK - no bypass allowed
# All jobs use the pre-built security scanner container
# ============================================================================

scan-secrets:
  stage: dlp
  image: ${DOCKER_IMAGE}
  needs: [build-security-container]
  script:
    - echo "🔍 Running Secret Scanning (DLP)..."
    - ./scripts/update-commit-dates.sh --verbose
    - make scan-secrets
  tags:
    - docker

scan-security:
  stage: dlp
  image: ${DOCKER_IMAGE}
  needs: [build-security-container]
  script:
    - echo "🔒 Running Security Scanning..."
    - make scan-security
  tags:
    - docker

scan-vulnerability:
  stage: dlp
  image: ${DOCKER_IMAGE}
  needs: [build-security-container]
  script:
    - echo "🛡️  Running Vulnerability Scanning..."
    - make scan-vulnerability
  tags:
    - docker

# ============================================================================
# PHASE 2: DLP TESTS
# Tests that validate the scan jobs themselves (HARD BLOCK)
# ============================================================================

test-tools:
  stage: dlp-tests
  image: ${DOCKER_IMAGE}
  needs: [scan-secrets, scan-security, scan-vulnerability]
  script:
    - echo "🔧 Running DevX Tool Tests..."
    - make test-tools
  tags:
    - docker

# ============================================================================
# PHASE 3: VALIDATION
# Strategy-to-BDD stack and DevX tools validation (HARD BLOCK)
# ============================================================================

validate-strategy:
  stage: validation
  image: ${DOCKER_IMAGE}
  needs: [test-tools]
  script:
    - echo "📊 Validating Strategy Chain..."
    - make test-strategy-chain
  tags:
    - docker

validate-toolchain:
  stage: validation
  image: ${DOCKER_IMAGE}
  needs: [test-tools]
  script:
    - echo "🔧 Validating Toolchain..."
    - make test-toolchain
  tags:
    - docker

validate-dates:
  stage: validation
  image: ${DOCKER_IMAGE}
  needs: [test-tools]
  script:
    - echo "📅 Validating Date References..."
    - make test-dates
  tags:
    - docker

# ============================================================================
# PHASE 4: EXECUTION
# DevX tools act on validated application code (HARD BLOCK)
# ============================================================================

setup:
  stage: execution
  image: alpine:latest
  needs: [validate-strategy, validate-toolchain, validate-dates]
  before_script:
    - apk add --no-cache make git curl nodejs npm go python3 py3-pip
    - pip install yamllint markdownlint shellcheck
  script:
    - echo "📦 Setting up environment..."
    - make deps
  artifacts:
    paths:
      - vendor/
      - node_modules/
    expire_in: 1 hour
  tags:
    - alpine

test-validation:
  stage: execution
  image: node:20
  needs: [setup]
  script:
    - echo "🧪 Running Validation Tests..."
    - npm install
    - make test-validation
  tags:
    - node

lint:
  stage: execution
  image: alpine:latest
  needs: [setup]
  before_script:
    - apk add --no-cache make git curl nodejs npm go python3 py3-pip
    - pip install yamllint markdownlint shellcheck
  script:
    - echo "🔍 Running Linting..."
    - make lint
  tags:
    - alpine

test-unit:
  stage: execution
  image: golang:1.21
  needs: [setup, lint]
  before_script:
    - apt-get update && apt-get install -y make git curl nodejs npm
  script:
    - echo "🧪 Running Unit Tests..."
    - make test-unit
  tags:
    - go

build:
  stage: execution
  image: golang:1.21
  needs: [setup, test-unit, test-validation]
  before_script:
    - apt-get update && apt-get install -y make git curl nodejs npm docker
  script:
    - echo "🔨 Building application..."
    - make build
  tags:
    - go

test-cncf-compliance:
  stage: execution
  image: ${DOCKER_IMAGE}
  needs: [build]
  script:
    - echo "☸️  Running CNCF Compliance Tests..."
    - make test-cncf-compliance
  tags:
    - docker

# ============================================================================
# PHASE 5: ARTIFACT HANDLING
# Sign, package, and deploy artifacts
# ============================================================================

sign-artifacts:
  stage: artifact-handling
  image: alpine:latest
  needs: [build, test-cncf-compliance]
  before_script:
    - apk add --no-cache make git curl nodejs npm go cosign
  script:
    - echo "✍️  Signing artifacts..."
    - make sign
  tags:
    - alpine

publish-artifacts:
  stage: artifact-handling
  image: alpine:latest
  needs: [sign-artifacts]
  before_script:
    - apk add --no-cache make git curl nodejs npm go docker
  script:
    - echo "📦 Packaging artifacts..."
    - make package
  tags:
    - alpine

# ============================================================================
# DEPLOY STAGE
# ============================================================================

deploy:
  stage: deploy
  image: alpine:latest
  needs: [publish-artifacts]
  before_script:
    - apk add --no-cache kubectl helm
  script:
    - echo "🚀 Deploying to cluster..."
    - echo "Deploy logic would go here"
    - echo "✅ Deployment complete"
  when: manual
  tags:
    - alpine

# ============================================================================
# UPLOAD ARTIFACTS
# ============================================================================

upload:
  stage: artifact-handling
  image: alpine:latest
  needs: [publish-artifacts]
  script:
    - echo "📤 Uploading artifacts..."
    - mkdir -p dist
    - echo "Artifacts uploaded"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  tags:
    - alpine

# ============================================================================
# NIGHTLY PIPELINE
# ============================================================================

nightly:
  stage: build-security-container
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $DOCKER_REGISTRY
  script:
    - echo "🌙 Running nightly pipeline..."
    - docker build -t ${DOCKER_IMAGE} -f Dockerfile.security-scanner .
    - docker push ${DOCKER_IMAGE}
    - make ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: never
  tags:
    - docker
