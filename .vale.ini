# Vale Configuration for ChatBot Operator
# ========================================
# Documentation correctness checking using OpenSUSE Vale rules as base
# References: docs/omen/strategy.json (Developer Environment Goal DG001)
# References: docs/adr/architecture-decisions.md (ADR-012 - Platform-agnostic CI/CD)

# Styles: OpenSUSE base rules plus custom rules for this project
StylesPath = .vale/styles

# Minimum alert level (suggestion, warning, error)
MinAlertLevel = warning

# Enable all OpenSUSE rules by default
[*.{md,yaml,yml,json}]
BasedOnStyles = OpenSUSE

# Custom rules for this project
# Ensure all documents have proper references
[*.md]
# Check for required sections in documentation
# Check for proper heading hierarchy
# Check for code block syntax

# YAML/JSON specific rules
[*.{yaml,yml,json}]
# Check for proper indentation
# Check for valid YAML/JSON syntax

# Custom rule: Check for hard references between documents
# This is enforced through our validation scripts, not Vale

# Custom rule: Check for no manual dates
# This is enforced through our date validation script

# OpenSUSE rules configuration
# These are the base rules we're using from OpenSUSE
[OpenSUSE]
# Path to OpenSUSE rules (will be downloaded)
Path = .vale/styles/OpenSUSE

# Enable specific OpenSUSE rules
# We enable most rules but can disable specific ones if needed

# Rule: Check for consistent heading capitalization
# Rule: Check for proper punctuation
# Rule: Check for consistent terminology

# Custom vocabulary for this project
[*.{md,yaml,yml,json}]
# Accept these terms as valid
Accept = Kubernetes, Kubebuilder, CRD, Operator, Linkerd, OPA, Gatekeeper, Argo, CD, CI, GitOps, SLSA, CNCF, Zero, Trust, mTLS, ABAC, RBAC, Platform, Engineering, AppDev, ChatBot, Provisioner, Slack, Matrix, Discord, Twilio

# Reject these terms (deprecated or incorrect)
Reject = Java, Maven, Gradle, Spring, Boot

# Custom patterns to check
# Check for references to strategy documents
[*.md]
# Pattern to ensure documents reference strategy
# This is handled by our validation scripts

# Vale configuration version
Version = 1.0.0
